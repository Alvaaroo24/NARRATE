x-default-config: &default-config
  restart: unless-stopped
  environment:
    - TZ=UTC
  logging:
    driver: "json-file"
    options:
      max-size: "50m"

services:
  imc:
    image: imc-fastapi:qa
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imc_fastapi
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - .:/app

